<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>CPO LEADS -- Global Security Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* Auth overlay */
.auth-overlay{position:fixed;inset:0;background:#06080d;z-index:200;display:flex;align-items:center;justify-content:center}
.auth-box{background:rgba(15,20,30,0.95);backdrop-filter:blur(20px);border:1px solid rgba(201,168,76,0.12);border-radius:12px;padding:32px;width:100%;max-width:400px;margin:20px}
.auth-box h1{font-size:24px;font-weight:800;margin-bottom:4px;letter-spacing:1px}
.auth-box h1 span,.auth-box h1 .gold{background:linear-gradient(135deg,#C9A84C,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-box .auth-sub{color:#7a7770;font-size:13px;margin-bottom:24px}
.auth-box .auth-field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.auth-box .auth-field label{font-size:10px;color:#C9A84C;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.auth-box .auth-field input{padding:10px 14px;background:rgba(6,8,13,.8);border:1px solid rgba(201,168,76,0.12);border-radius:6px;color:#e8e6e3;font-size:14px;outline:none;font-family:inherit;transition:border-color .2s}
.auth-box .auth-field input:focus{border-color:#C9A84C;box-shadow:0 0 0 2px rgba(201,168,76,.1)}
.auth-box .auth-btn{width:100%;padding:12px;background:linear-gradient(135deg,#C9A84C,#8B7635);color:#06080d;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit;transition:all .2s}
.auth-box .auth-btn:hover{background:linear-gradient(135deg,#D4AF37,#C9A84C);box-shadow:0 0 20px rgba(201,168,76,.25)}
.auth-box .auth-toggle{text-align:center;margin-top:16px;font-size:13px;color:#7a7770}
.auth-box .auth-toggle a{color:#C9A84C;cursor:pointer;text-decoration:none;transition:color .2s}
.auth-box .auth-toggle a:hover{color:#D4AF37}
.auth-box .auth-error{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);color:#c0392b;padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:12px;display:none}
.auth-box .auth-success{background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);color:#27ae60;padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:12px;display:none}
.user-menu{display:flex;align-items:center;gap:8px;font-size:12px;color:#7a7770}
.user-menu button{background:none;border:1px solid rgba(201,168,76,0.12);color:#7a7770;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s}
.user-menu button:hover{color:#C9A84C;border-color:rgba(201,168,76,0.3)}

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080d;--bg2:#0a0e1a;--surface:rgba(15,20,30,0.8);--surface2:rgba(20,26,40,0.9);
  --border:rgba(201,168,76,0.12);--border-hover:rgba(201,168,76,0.3);
  --fg:#e8e6e3;--muted:#7a7770;--dim:#52504d;
  --gold:#C9A84C;--gold-light:#D4AF37;--gold-dark:#8B7635;--gold-dim:rgba(201,168,76,0.15);--gold-glow:rgba(201,168,76,0.08);
  --red:#c0392b;--blue:#2980b9;--purple:#8e44ad;--amber:#D4AF37;--green:#27ae60;
  --accent:#C9A84C;--accent2:#8B7635;
  --radius:8px;--radius-lg:12px
}
body{font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* Header */
.header{position:sticky;top:0;z-index:50;background:rgba(6,8,13,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
.header h1 span,.header h1 .gold{background:linear-gradient(135deg,#C9A84C,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-actions{display:flex;gap:8px;align-items:center}

/* Tabs */
.tabs{display:flex;gap:0;padding:0 20px;border-bottom:1px solid var(--border);background:rgba(10,14,26,.6)}
.tab{padding:12px 20px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;user-select:none;text-transform:uppercase;letter-spacing:1px}
.tab:hover{color:var(--fg)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab .tab-count{background:rgba(201,168,76,0.1);color:var(--muted);padding:1px 7px;border-radius:10px;font-size:10px;margin-left:6px}
.tab.active .tab-count{background:rgba(201,168,76,.15);color:var(--gold)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#C9A84C,#8B7635);color:#06080d;font-weight:700}.btn-primary:hover{background:linear-gradient(135deg,#D4AF37,#C9A84C);box-shadow:0 0 20px rgba(201,168,76,.25)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--border-hover);color:var(--gold);background:rgba(201,168,76,0.05)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(192,57,43,.3)}.btn-danger:hover{background:rgba(192,57,43,.1)}
.btn-sm{padding:6px 12px;font-size:12px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;padding:16px 20px}
.stat{background:var(--surface);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;transition:all .25s}
.stat:hover{border-color:var(--border-hover);transform:translateY(-1px)}
.stat-val{font-size:22px;font-weight:800}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* Filters */
.filters{display:flex;gap:8px;padding:0 20px 12px;flex-wrap:wrap}
.filters input,.filters select{padding:8px 12px;background:rgba(15,20,30,0.8);border:1px solid var(--border);border-radius:6px;color:var(--fg);font-size:13px;outline:none;font-family:inherit;transition:border-color .2s}
.filters input:focus,.filters select:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,.1)}
.filters input{flex:1;min-width:160px}

/* Lead cards */
.leads{padding:0 20px 100px;display:flex;flex-direction:column;gap:6px}
.lead-card{background:var(--surface);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:12px}
.lead-card:hover{background:var(--surface2);border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 4px 20px rgba(201,168,76,.06)}
.lead-card:active{transform:scale(.995)}
.lead-info{flex:1;min-width:0}
.lead-company{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Job cards */
.job-card{background:var(--surface);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all .25s;display:flex;flex-direction:column;gap:10px}
.job-card:hover{background:var(--surface2);border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 4px 20px rgba(201,168,76,.06)}
.job-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.job-title{font-weight:700;font-size:15px;flex:1;cursor:pointer;transition:color .2s}
.job-title:hover{color:var(--gold)}
.job-salary{color:var(--gold);font-weight:800;font-size:14px;white-space:nowrap}
.job-row{display:flex;gap:12px;align-items:center;font-size:12px;color:var(--muted);flex-wrap:wrap}
.job-row span{display:inline-flex;align-items:center;gap:4px}
.job-actions{display:flex;gap:8px;align-items:center;margin-top:4px}
.btn-apply{background:linear-gradient(135deg,#C9A84C,#8B7635);color:#06080d;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:all .2s;border:none;cursor:pointer;font-family:inherit}
.btn-apply:hover{background:linear-gradient(135deg,#D4AF37,#C9A84C);transform:scale(1.02);box-shadow:0 0 16px rgba(201,168,76,.3)}
.job-source{font-size:10px;color:var(--gold);background:var(--gold-dim);padding:2px 8px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;border:1px solid var(--border)}
.lead-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.lead-badges{display:flex;gap:6px;flex-shrink:0;align-items:center}
.badge{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.badge-security{background:rgba(41,128,185,.15);color:#5dade2;border:1px solid rgba(41,128,185,.2)}
.badge-management{background:rgba(142,68,173,.15);color:#bb8fce;border:1px solid rgba(142,68,173,.2)}
.badge-agency{background:rgba(201,168,76,.15);color:#C9A84C;border:1px solid rgba(201,168,76,.2)}
.badge-job{background:rgba(212,175,55,.15);color:#D4AF37;border:1px solid rgba(212,175,55,.2)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.salary-tag{font-size:11px;color:var(--gold);font-weight:700}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(6,8,13,.7);backdrop-filter:blur(8px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:rgba(15,20,30,0.95);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:12px 12px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:24px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{font-size:18px;margin-bottom:20px;font-weight:700;background:linear-gradient(135deg,#C9A84C,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field label{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.field input,.field select,.field textarea{padding:10px 14px;background:rgba(6,8,13,.8);border:1px solid var(--border);border-radius:6px;color:var(--fg);font-size:14px;outline:none;font-family:inherit;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,.1)}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:flex;gap:8px}
.field-row .field{flex:1}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-text{font-size:14px}

/* Detail panel */
.detail-bg{position:fixed;inset:0;background:rgba(6,8,13,.6);backdrop-filter:blur(8px);z-index:100;display:none}
.detail-bg.open{display:block}
.detail{position:fixed;top:0;right:0;bottom:0;width:100%;max-width:420px;background:rgba(10,14,26,.97);backdrop-filter:blur(20px);border-left:1px solid var(--border);z-index:101;overflow-y:auto;padding:24px;display:none;animation:slideLeft .25s ease}
.detail.open{display:block}
@keyframes slideLeft{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.detail-header h2{font-size:18px;font-weight:700;flex:1}
.close-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px;transition:color .2s}
.close-btn:hover{color:var(--gold)}
.detail-section{margin-bottom:16px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(201,168,76,.06)}
.detail-row:last-child{border:none}
.detail-label{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.detail-value{font-size:14px;text-align:right}
.detail-value a{color:var(--gold);text-decoration:none;transition:color .2s}
.detail-value a:hover{color:var(--gold-light);text-decoration:underline}

/* Dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;padding:16px 20px}
.dash-card{background:var(--surface);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;transition:border-color .25s}
.dash-card:hover{border-color:var(--border-hover)}
.dash-card h3{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;font-weight:700}
.dash-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.dash-bar-label{font-size:12px;color:var(--muted);width:80px;flex-shrink:0}
.dash-bar-track{flex:1;height:6px;background:rgba(201,168,76,.06);border-radius:3px;overflow:hidden}
.dash-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.dash-bar-count{font-size:12px;font-weight:700;width:30px;text-align:right}
.dash-pipeline{display:flex;gap:4px;margin-top:8px}
.dash-pipe-stage{flex:1;text-align:center;padding:10px 4px;background:rgba(201,168,76,.04);border-radius:var(--radius);border:1px solid var(--border);transition:border-color .2s}
.dash-pipe-stage:hover{border-color:var(--border-hover)}
.dash-pipe-stage .pipe-val{font-size:20px;font-weight:800}
.dash-pipe-stage .pipe-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.dash-regions{display:flex;flex-wrap:wrap;gap:6px}
.region-chip{padding:6px 12px;background:rgba(201,168,76,.06);border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--muted)}
.region-chip:hover{background:linear-gradient(135deg,#C9A84C,#8B7635);color:#06080d;border-color:var(--gold)}
.region-chip .region-count{opacity:.6;margin-left:4px}
.sort-select{padding:6px 10px;background:rgba(15,20,30,0.8);border:1px solid var(--border);border-radius:6px;color:var(--fg);font-size:12px;outline:none;cursor:pointer;font-family:inherit;transition:border-color .2s}
.sort-select:focus{border-color:var(--gold)}
.quick-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.lead-card:hover .quick-actions{opacity:1}
.quick-btn{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
.quick-btn:hover{background:linear-gradient(135deg,#C9A84C,#8B7635);color:#06080d;border-color:var(--gold)}
.activity-log{margin-top:16px;border-top:1px solid var(--border);padding-top:12px}
.activity-item{display:flex;gap:8px;align-items:flex-start;padding:6px 0;font-size:11px;color:var(--muted)}
.activity-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);margin-top:4px;flex-shrink:0}
.export-menu{position:relative;display:inline-block}
.export-dropdown{position:absolute;top:100%;right:0;background:rgba(15,20,30,0.95);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);padding:4px;display:none;z-index:60;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.export-dropdown.open{display:block}
.export-item{display:block;width:100%;padding:8px 12px;text-align:left;background:none;border:none;color:var(--fg);font-size:12px;cursor:pointer;border-radius:6px;font-family:inherit;transition:all .15s}
.export-item:hover{background:rgba(201,168,76,.15);color:var(--gold)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,.2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(201,168,76,.35)}

@media(min-width:640px){
  .modal-bg{align-items:center}
  .modal{border-radius:12px;max-height:80vh}
  .stats{grid-template-columns:repeat(5,1fr)}
}
</style>
</head>
<body>

<!-- Auth Overlay -->
<div class="auth-overlay" id="auth-overlay">
  <div class="auth-box">
    <h1>&#x1F6E1;&#xFE0F; <span>CPO</span> Leads</h1>
    <div class="auth-sub">Close protection job intelligence platform</div>
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-success" id="auth-success"></div>
    <div id="auth-form-login">
      <div class="auth-field"><label>Email</label><input type="email" id="auth-email" placeholder="you@email.com"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="auth-pass" placeholder="Your password"></div>
      <button class="auth-btn" onclick="authLogin()">Log In</button>
      <div class="auth-toggle"><a onclick="showSignup()">Create account</a> &middot; <a onclick="showReset()">Forgot password?</a></div>
    </div>
    <div id="auth-form-signup" style="display:none">
      <div class="auth-field"><label>Email</label><input type="email" id="signup-email" placeholder="you@email.com"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="signup-pass" placeholder="Min 6 characters"></div>
      <button class="auth-btn" onclick="authSignup()">Create Account</button>
      <div style="text-align:center;margin-top:12px;font-size:11px;color:var(--muted)">By signing up you agree to our Terms of Service</div>
      <div class="auth-toggle"><a onclick="showLogin()">Already have an account? Log in</a></div>
    </div>
    <div id="auth-form-reset" style="display:none">
      <div class="auth-field"><label>Email</label><input type="email" id="reset-email" placeholder="you@email.com"></div>
      <button class="auth-btn" onclick="authReset()">Send Reset Link</button>
      <div class="auth-toggle"><a onclick="showLogin()">Back to login</a></div>
    </div>
  </div>
</div>

<div class="header">
  <h1>&#x1F6E1;&#xFE0F; <span class="gold">CPO</span> LEADS</h1>
  <div class="header-actions">
    <div class="user-menu" id="user-menu"><span id="user-email"></span><button onclick="authLogout()">Log out</button></div>
    <div class="export-menu">
      <button class="btn btn-ghost btn-sm" onclick="toggleExport()">Export</button>
      <div class="export-dropdown" id="export-menu">
        <button class="export-item" onclick="exportCSV('all')">All Leads (CSV)</button>
        <button class="export-item" onclick="exportCSV('companies')">Companies Only</button>
        <button class="export-item" onclick="exportCSV('jobs')">Jobs Only</button>
        <button class="export-item" onclick="exportJSON()">Full Backup (JSON)</button>
      </div>
    </div>
    <button class="btn btn-primary" onclick="openAdd()">+ Add</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-companies" onclick="switchTab('companies')">Companies <span class="tab-count" id="count-companies">0</span></div>
  <div class="tab" id="tab-jobs" onclick="switchTab('jobs')">Job Listings <span class="tab-count" id="count-jobs">0</span></div>
  <div class="tab" id="tab-saved" onclick="switchTab('saved')">Saved <span class="tab-count" id="count-saved">0</span></div>
  <div class="tab" id="tab-guide" onclick="switchTab('guide')">Guide</div>
  <div class="tab" id="tab-dashboard" onclick="switchTab('dashboard')">Dashboard</div>
  <div class="tab" id="tab-strategy" onclick="switchTab('strategy')">Strategy</div>
</div>

<div class="stats" id="stats"></div>
<div id="dashboard-view" style="display:none"></div>
<div id="strategy-view" style="display:none"></div>
<div id="guide-view" style="display:none;padding:20px;max-width:800px;margin:0 auto"></div>
<div id="saved-view" style="display:none"></div>
<div id="list-view">
<div style="padding:0 20px 8px;position:relative">
  <input type="text" id="global-search" placeholder="Search everything — companies, jobs, locations, notes..." oninput="globalSearch(this.value)" style="width:100%;padding:12px 16px 12px 40px;background:rgba(15,20,30,0.8);border:1px solid rgba(201,168,76,0.12);border-radius:8px;color:#e8e6e3;font-size:14px;outline:none;font-family:inherit;transition:border-color .2s">
  <span style="position:absolute;left:32px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none">&#x1F50D;</span>
  <div id="search-results" style="display:none;position:absolute;left:20px;right:20px;top:100%;background:rgba(15,20,30,0.97);backdrop-filter:blur(16px);border:1px solid rgba(201,168,76,0.12);border-radius:0 0 8px 8px;max-height:400px;overflow-y:auto;z-index:60;box-shadow:0 12px 40px rgba(0,0,0,.6)"></div>

  if(data.user && !data.user.confirmed_at) {
    showAuthSuccess('Check your email for confirmation link!');
  } else {
    onAuthSuccess(data.user);
  }
}

async function authReset() {
  hideAuthMsg();

  currentUser = user;
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('user-email').textContent = user.email;

  await loadScrapedJobs();

async function loadScrapedJobs() {
  try {
    const {data, error} = await sb.from('job_listings').select('*').order('scraped_at', {ascending: false}).limit(200);
    if (error || !data || !data.length) return;
    const now = new Date().toISOString();
    let added = 0;
    for (const j of data) {
      // Check if already in local leads by title+company
      const exists = leads.some(l => l.company.toLowerCase().includes(j.company?.toLowerCase() || '???') && l.company.toLowerCase().includes(j.title?.toLowerCase().substring(0,20) || '???'));
      if (exists) continue;
      leads.push({
        id: j.id || uid(),
        company: (j.company || '') + ' \u2014 ' + (j.title || ''),
        type: 'security',
        website: j.source_url || '',
        location: j.location || '',
        country: j.country || '',
        priority: 'medium',
        notes: (j.salary ? j.salary + '. ' : '') + 'Source: ' + (j.source || '') + '. ACTIVE LISTING.',
        category: 'job',
        status: 'ny',
        contact_person: null,
        email: null,
        phone: null,
        saved: false,
        created_at: j.scraped_at || now,
        updated_at: j.scraped_at || now,
      });
      added++;
    }
    if (added > 0) {
      persist();
      refresh();
      console.log('Loaded ' + added + ' fresh jobs from Supabase');
    }
  } catch(e) { console.error('Failed to load scraped jobs:', e); }
}

// Check session on load
(async () => {
  const {data:{session}} = await sb.auth.getSession();
  if(session && session.user) {
    onAuthSuccess(session.user);
  }
  // Listen for auth changes (email confirm redirect)
  sb.auth.onAuthStateChange((event, session) => {
    if(session && session.user) onAuthSuccess(session.user);
  });
})();

document.addEventListener('keydown', e => {

    if(document.activeElement.id==='signup-email'||document.activeElement.id==='signup-pass') authSignup();
    if(document.activeElement.id==='reset-email') authReset();
  }
});

function expandSeed(s){
  const now=new Date().toISOString();
  const uid=()=>crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2);
  return{id:uid(),company:s.c,type:s.t,website:s.w||null,location:s.l||null,country:s.co||null,priority:s.p||'medium',notes:s.n||null,category:s.j?'job':'company',status:'ny',contact_person:s.cp||null,email:s.e||null,phone:s.ph||null,created_at:now,updated_at:now};
}

const SEED_VERSION = 5;
let leads;
if (localStorage.getItem('cp_seed_version') !== String(SEED_VERSION)) {
  leads = SEED_DATA.map(expandSeed);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));
  localStorage.setItem('cp_seed_version', String(SEED_VERSION));
} else {
  leads = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if (!leads.length) { leads = SEED_DATA.map(expandSeed); localStorage.setItem(STORAGE_KEY, JSON.stringify(leads)); }
}

function isJob(l) { return l.category === 'job' || (l.notes && l.notes.includes('AKTIV STILLING')); }

function persist() { localStorage.setItem(STORAGE_KEY, JSON.stringify(leads)); }
function uid() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2); }

let searchTimeout = null;
function globalSearch(query) {
  clearTimeout(searchTimeout);
  const box = document.getElementById('search-results');
  if (!query || query.length < 2) { box.style.display = 'none'; return; }
  searchTimeout = setTimeout(() => {
    const q = query.toLowerCase();
    const results = leads.filter(l => {
      const hay = [l.company,l.contact_person,l.location,l.country,l.notes,l.website,l.email].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(q);
    }).slice(0, 15);
    if (!results.length) {
      box.innerHTML = '<div style="padding:16px;color:var(--muted);text-align:center">No results for "'+esc(query)+'"</div>';
    } else {
      box.innerHTML = results.map(l => {
        const job = isJob(l);
        const salary = extractSalary(l.notes);
        return `<div onclick="closeSearch();${job?"switchTab('jobs')":"switchTab('companies')"};openDetail('${l.id}')" style="padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='transparent'">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(l.company)}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${l.location?esc(l.location):''}${l.country&&l.country!=='UK'&&l.country!=='USA'?' \u00b7 '+esc(l.country):''}</div>
          </div>
          ${salary?'<span style="color:var(--accent);font-weight:700;font-size:12px;white-space:nowrap">'+esc(salary)+'</span>':''}
          <span class="badge ${job?'badge-job':typeBadge[l.type]||'badge-security'}" style="font-size:9px">${job?'JOB':typeLabels[l.type]||l.type}</span>
        </div>`;
      }).join('');
    }
    box.style.display = 'block';
  }, 150);
}

function closeSearch() {
  document.getElementById('global-search').value = '';
  document.getElementById('search-results').style.display = 'none';
}

document.addEventListener('click', e => {
  if (!e.target.closest('#global-search') && !e.target.closest('#search-results')) {
    document.getElementById('search-results').style.display = 'none';
  }
});

document.addEventListener('keydown', e => {
  if (e.key === '/' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
    document.getElementById('global-search').focus();
  }
});

function switchTab(tab) {
  activeTab = tab;
  ['companies','jobs','saved','guide','dashboard','strategy'].forEach(t => {
    const el = document.getElementById('tab-'+t);
    if(el) el.classList.toggle('active', tab === t);
  });
  document.getElementById('list-view').style.display = (tab==='companies'||tab==='jobs') ? '' : 'none';
  document.getElementById('saved-view').style.display = tab==='saved' ? '' : 'none';
  document.getElementById('guide-view').style.display = tab==='guide' ? '' : 'none';
  document.getElementById('dashboard-view').style.display = tab==='dashboard' ? '' : 'none';
  document.getElementById('strategy-view').style.display = tab==='strategy' ? '' : 'none';
  document.getElementById('stats').style.display = (tab==='guide') ? 'none' : '';
  if(tab==='dashboard') renderDashboard();
  else if(tab==='strategy') renderStrategy();
  else if(tab==='saved') renderSaved();
  else if(tab==='guide') renderGuide();
  else refresh();
}

function toggleSaved(id) {
  const idx = leads.findIndex(x=>x.id===id);
  if(idx>=0) { leads[idx].saved = !leads[idx].saved; persist(); }
}

function renderSaved() {
  const el = document.getElementById('saved-view');
  const saved = leads.filter(l => l.saved);
  document.getElementById('count-saved').textContent = saved.length;
  if(!saved.length) {
    el.innerHTML = '<div class="empty" style="padding:60px 20px"><div class="empty-icon" style="font-size:40px;opacity:.5">\u2606</div><div class="empty-text">No saved jobs yet.<br><span style="font-size:12px;color:var(--muted)">Click the star on any job or company to save it here.</span></div></div>';
    return;
  }
  el.innerHTML = '<div style="padding:12px 20px"><h2 style="font-size:16px;margin-bottom:4px">Saved (' + saved.length + ')</h2><p style="font-size:12px;color:var(--muted)">Jobs and companies you\'re interested in applying to</p></div><div class="leads" style="padding:0 20px 100px">' +
    saved.map(l => {
      const salary = extractSalary(l.notes);
      const job = isJob(l);
      const url = l.website ? (l.website.startsWith('http') ? l.website : 'https://'+l.website) : '';
      return `<div class="job-card">
        <div class="job-header">
          <div>
            <div class="job-title" onclick="openDetail('${l.id}')">${esc(l.company)}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${l.location?esc(l.location):''}${l.country?' \u00b7 '+esc(l.country):''}</div>
          </div>
          ${salary?'<div class="job-salary">'+esc(salary)+'</div>':''}
        </div>
        <div class="job-actions">
          ${url?'<a href="'+url+'" target="_blank" class="btn-apply" onclick="event.stopPropagation()">Apply \u2192</a>':''}
          <button class="btn btn-ghost btn-sm" onclick="openDetail('${l.id}')" style="font-size:11px">Details</button>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();toggleSaved('${l.id}');renderSaved()" style="font-size:11px;color:var(--red);border-color:rgba(239,68,68,.3)">Remove</button>
          <span class="badge ${job?'badge-job':typeBadge[l.type]||'badge-security'}" style="margin-left:auto">${job?'JOB':typeLabels[l.type]||l.type}</span>
        </div>
      </div>`;
    }).join('') + '</div>';
}

  'UK':['UK','United Kingdom','England','Scotland','Wales'],
  'USA':['USA','US','United States'],
  'UAE':['UAE','Dubai','Qatar','Saudi','Saudi Arabia','Bahrain','Kuwait','Oman'],
  'Europe':['Belgium','France','Germany','Netherlands','Switzerland','Austria','Poland','Italy','Spain','Norway','Denmark','Sweden','Finland','Ireland','Portugal','Greece','Czech','Hungary','Romania'],
  'Africa':['Ghana','Nigeria','Kenya','South Africa','DRC','Angola','Mozambique','Tanzania','Uganda','Ethiopia','Sudan','Somalia','Egypt','Libya','Morocco','Tunisia'],
  'Asia':['Singapore','Japan','China','Hong Kong','India','Philippines','Indonesia','Thailand','Vietnam','Australia','New Zealand','Myanmar','East Asia'],
  'LATAM':['Colombia','Argentina','El Salvador','Guatemala','Brazil','Mexico','Chile','Peru','Ecuador','Panama','Costa Rica'],
  'International':['International','Global','Globalt']
};

function matchRegion(l, region) {
  if(!region) return true;
  const countries = regionMap[region] || [region];
  const haystack = [l.country, l.location].filter(Boolean).join(' ');
  return countries.some(c => haystack.toLowerCase().includes(c.toLowerCase()));
}

function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const type = document.getElementById('filter-type').value;
  const status = document.getElementById('filter-status').value;
  const country = document.getElementById('filter-country').value;
  return leads.filter(l => {
    if (activeTab === 'jobs' && !isJob(l)) return false;
    if (activeTab === 'companies' && isJob(l)) return false;
    if (type && l.type !== type) return false;
    if (status && l.status !== status) return false;
    if (country && !matchRegion(l, country)) return false;
    if (search) {
      const hay = [l.company,l.contact_person,l.location,l.country,l.notes].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

function renderStats() {
  const el = document.getElementById('stats');
  const filtered = getFiltered();
  const total = filtered.length;
  const byStatus = {};
  filtered.forEach(l => { const s = statusLabels[l.status]||l.status||'New'; byStatus[s] = (byStatus[s]||0)+1; });
  const chips = [
    {label:'Total',val:total,color:'var(--accent)'},
    ...Object.entries(byStatus).map(([s,c])=>({label:s,val:c,color:statusColors[Object.keys(statusLabels).find(k=>statusLabels[k]===s)||'ny']||'var(--fg)'}))
  ];
  el.innerHTML = chips.map(c=>`<div class="stat"><div class="stat-val" style="color:${c.color}">${c.val}</div><div class="stat-label">${c.label}</div></div>`).join('');

  // Update tab counts
  document.getElementById('count-companies').textContent = leads.filter(l => !isJob(l)).length;
  document.getElementById('count-jobs').textContent = leads.filter(l => isJob(l)).length;
  document.getElementById('count-saved').textContent = leads.filter(l => l.saved).length;
}

function parseSalaryNum(notes) {
  if(!notes) return 0;
  const m = notes.match(/[\$\£]([\d,]+)/);
  return m ? parseInt(m[1].replace(/,/g,'')) : 0;
}

function applyFilters() {
  const filtered = getFiltered();
  const sortBy = document.getElementById('sort-by').value;
  if(sortBy==='salary') filtered.sort((a,b) => parseSalaryNum(b.notes) - parseSalaryNum(a.notes));
  else if(sortBy==='date') filtered.sort((a,b) => (b.created_at||'').localeCompare(a.created_at||''));
  else if(sortBy==='name') filtered.sort((a,b) => (a.company||'').localeCompare(b.company||''));
  else if(sortBy==='status') {
    const so={ny:0,kontaktet:1,applied:2,interview:3,offer:4,rejected:5};
    filtered.sort((a,b) => (so[a.status]||0) - (so[b.status]||0));
  }
  else filtered.sort((a,b) => (priorityOrder[a.priority]||1) - (priorityOrder[b.priority]||1));
  renderList(filtered);
}

function extractSalary(notes) {
  if (!notes) return '';
  const m = notes.match(/\$[\d,.]+[Kk]?(?:\/(?:yr|year|dag|day|hr|t))?(?:\s*[-\u2013]\s*\$[\d,.]+[Kk]?(?:\/(?:yr|year|dag|day|hr|t))?)?|\u00a3[\d,.]+[Kk]?(?:\/(?:yr|year))?(?:\s*[-\u2013]\s*\u00a3[\d,.]+[Kk]?(?:\/(?:yr|year))?)?/);
  return m ? m[0] : '';
}

function extractSource(l) {
  const c = (l.company||'').toLowerCase();
  if (c.includes('silent professionals')) return 'Silent Professionals';
  if (c.includes('gdba') || c.includes('gavin de becker')) return 'GDBA';
  if (c.includes('gardaworld') || c.includes('garda')) return 'GardaWorld';
  if (c.includes('constellis')) return 'Constellis';
  if (c.includes('crisis24')) return 'Crisis24';
  if (c.includes('guildhall') || c.includes('gulftale')) return 'GulfTalent';
  if (c.includes('nato') || c.includes('undss') || c.includes('unops') || c.includes('osce') || c.includes('interpol')) return 'Intl Org';
  if ((l.notes||'').includes('LinkedIn')) return 'LinkedIn';
  if ((l.notes||'').includes('Indeed')) return 'Indeed';
  return '';
}

function getApplyUrl(l) {
  if (!l.website) return '';
  return l.website.startsWith('http') ? l.website : 'https://' + l.website;
}

  if (!company) { document.getElementById('f-company').style.borderColor='var(--red)'; return; }
  const data = {
    company,
    category: document.getElementById('f-category').value,
    type: document.getElementById('f-type').value,
    contact_person: document.getElementById('f-contact').value.trim()||null,
    email: document.getElementById('f-email').value.trim()||null,
    phone: document.getElementById('f-phone').value.trim()||null,
    website: document.getElementById('f-website').value.trim()||null,
    location: document.getElementById('f-location').value.trim()||null,
    country: document.getElementById('f-country').value.trim()||'UK',
    status: document.getElementById('f-status').value,
    priority: document.getElementById('f-priority').value,
    notes: document.getElementById('f-notes').value.trim()||null
  };
  const editId = document.getElementById('edit-id').value;
  if (editId) {
    const idx = leads.findIndex(x=>x.id===editId);

    data.id = uid();
    data.created_at = new Date().toISOString();
    data.updated_at = data.created_at;
    leads.unshift(data);
  }
  persist();
  closeModal();
  refresh();
}

function deleteLead(id) {

}

function refresh() {

function exportCSV(filter) {
  let data = leads;
  if(filter==='companies') data = leads.filter(l=>!isJob(l));
  else if(filter==='jobs') data = leads.filter(l=>isJob(l));
  const headers = ['Company','Type','Category','Status','Priority','Location','Country','Website','Email','Phone','Contact','Notes','Created'];
  const rows = data.map(l=>[l.company,l.type,l.category||'company',l.status,l.priority,l.location,l.country,l.website,l.email,l.phone,l.contact_person,l.notes,l.created_at].map(v=>'"'+(v||'').replace(/"/g,'""')+'"'));
  const csv = [headers.join(','), ...rows.map(r=>r.join(','))].join('\n');
  downloadFile('cpo_leads_'+filter+'_'+new Date().toISOString().slice(0,10)+'.csv', csv, 'text/csv');
  document.getElementById('export-menu').classList.remove('open');
}

function exportJSON() {
  downloadFile('cpo_leads_backup_'+new Date().toISOString().slice(0,10)+'.json', JSON.stringify(leads,null,2), 'application/json');
  document.getElementById('export-menu').classList.remove('open');
}

function downloadFile(name, content, type) {
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=name; a.click();
  URL.revokeObjectURL(url);
}

function renderDashboard() {
  const companies = leads.filter(l=>!isJob(l));
  const jobs = leads.filter(l=>isJob(l));
  const all = leads;

  // Status breakdown
  const statusCounts = {};
  all.forEach(l => { const s=statusLabels[l.status]||'New'; statusCounts[s]=(statusCounts[s]||0)+1; });
  const maxStatus = Math.max(...Object.values(statusCounts),1);

  // Region breakdown
  const regionCounts = {};
  all.forEach(l => {
    let region = 'Other';
    for(const [r,countries] of Object.entries(regionMap)) {
      if(matchRegion(l,r)){region=r;break;}
    }
    regionCounts[region]=(regionCounts[region]||0)+1;
  });

  // Type breakdown
  const typeCounts = {};
  all.forEach(l => { const t=typeLabels[l.type]||l.type; typeCounts[t]=(typeCounts[t]||0)+1; });

  // Priority breakdown
  const priCounts = {hot:0,medium:0,low:0};
  all.forEach(l => { priCounts[l.priority||'medium']++; });

  // Salary stats for jobs
  const salaries = jobs.map(j=>parseSalaryNum(j.notes)).filter(s=>s>0);
  const avgSalary = salaries.length ? Math.round(salaries.reduce((a,b)=>a+b,0)/salaries.length) : 0;
  const maxSalary = salaries.length ? Math.max(...salaries) : 0;

  // Top salary jobs
  const topJobs = [...jobs].filter(j=>parseSalaryNum(j.notes)>0).sort((a,b)=>parseSalaryNum(b.notes)-parseSalaryNum(a.notes)).slice(0,5);

  const el = document.getElementById('dashboard-view');
  el.innerHTML = `
  <div class="dash-grid">
    <div class="dash-card">
      <h3>Application Pipeline</h3>
      <div class="dash-pipeline">
        <div class="dash-pipe-stage"><div class="pipe-val" style="color:#52504d">${statusCounts['New']||0}</div><div class="pipe-label">New</div></div>
        <div class="dash-pipe-stage"><div class="pipe-val" style="color:#2980b9">${statusCounts['Contacted']||0}</div><div class="pipe-label">Contacted</div></div>
        <div class="dash-pipe-stage"><div class="pipe-val" style="color:#8e44ad">${statusCounts['Applied']||0}</div><div class="pipe-label">Applied</div></div>
        <div class="dash-pipe-stage"><div class="pipe-val" style="color:#D4AF37">${statusCounts['Interview']||0}</div><div class="pipe-label">Interview</div></div>
        <div class="dash-pipe-stage"><div class="pipe-val" style="color:#27ae60">${statusCounts['Offer']||0}</div><div class="pipe-label">Offer</div></div>
      </div>
      <div style="margin-top:16px;display:flex;gap:16px">
        <div style="text-align:center;flex:1"><div style="font-size:28px;font-weight:800;color:var(--accent)">${companies.length}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Companies</div></div>
        <div style="text-align:center;flex:1"><div style="font-size:28px;font-weight:800;color:var(--amber)">${jobs.length}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Job Listings</div></div>
        <div style="text-align:center;flex:1"><div style="font-size:28px;font-weight:800;color:var(--red)">${priCounts.hot}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Hot Priority</div></div>
      </div>
    </div>

    <div class="dash-card">
      <h3>By Region</h3>
      <div class="dash-regions">
        ${Object.entries(regionCounts).sort((a,b)=>b[1]-a[1]).map(([r,c])=>
          `<div class="region-chip" onclick="document.getElementById('filter-country').value='${r}';switchTab('companies')">${r}<span class="region-count">${c}</span></div>`
        ).join('')}
      </div>
    </div>

    <div class="dash-card">
      <h3>Status Breakdown</h3>
      ${Object.entries(statusCounts).sort((a,b)=>b[1]-a[1]).map(([s,c])=>{
        const color = statusColors[Object.keys(statusLabels).find(k=>statusLabels[k]===s)||'ny']||'#52504d';
        return `<div class="dash-bar"><span class="dash-bar-label">${s}</span><div class="dash-bar-track"><div class="dash-bar-fill" style="width:${Math.round(c/maxStatus*100)}%;background:${color}"></div></div><span class="dash-bar-count" style="color:${color}">${c}</span></div>`;
      }).join('')}
    </div>

    <div class="dash-card">
      <h3>Salary Intel</h3>
      ${salaries.length ? `
        <div style="display:flex;gap:16px;margin-bottom:16px">
          <div style="flex:1;text-align:center"><div style="font-size:24px;font-weight:800;color:var(--accent)">$${avgSalary.toLocaleString()}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Avg Salary</div></div>
          <div style="flex:1;text-align:center"><div style="font-size:24px;font-weight:800;color:var(--accent)">$${maxSalary.toLocaleString()}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase">Highest</div></div>
        </div>
        <h3 style="margin-top:12px">Top Paying</h3>
        ${topJobs.map(j=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(j.company)}</span><span style="color:var(--accent);font-weight:700;font-size:12px;margin-left:8px">${extractSalary(j.notes)}</span></div>`).join('')}
      ` : '<div style="color:var(--muted);font-size:13px">No salary data in job listings</div>'}
    </div>

    <div class="dash-card">
      <h3>By Type</h3>
      ${Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).map(([t,c])=>{
        const pct = Math.round(c/all.length*100);
        return `<div class="dash-bar"><span class="dash-bar-label">${t}</span><div class="dash-bar-track"><div class="dash-bar-fill" style="width:${pct}%;background:var(--accent)"></div></div><span class="dash-bar-count">${c}</span></div>`;
      }).join('')}
    </div>

    <div class="dash-card">
      <h3>Quick Actions</h3>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="switchTab('jobs')" style="justify-content:center">Browse ${jobs.length} Job Listings</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('filter-status').value='ny';switchTab('companies')" style="justify-content:center">Review New Companies (${statusCounts['New']||0})</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('sort-by').value='salary';switchTab('jobs')" style="justify-content:center">Jobs by Salary</button>
        <button class="btn btn-ghost btn-sm" onclick="exportCSV('all')" style="justify-content:center">Export All Data</button>
      </div>
    </div>
  </div>`;
}

// === STRATEGY VIEW ===
function renderStrategy() {
  const companies = leads.filter(l=>!isJob(l));
  const jobs = leads.filter(l=>isJob(l));
  const hotCompanies = companies.filter(l=>l.priority==='hot');
  const newCompanies = companies.filter(l=>l.status==='ny');
  const hotJobs = jobs.filter(l=>l.priority==='hot');

  // Best fit scoring
  const fitKeywords = ['legion','royal guard','trilingual','french','norwegian','royal family','uhnw','hnwi','diplomatic','nato','military','multinational'];
  function fitScore(l) {
    const hay = [l.company,l.notes].filter(Boolean).join(' ').toLowerCase();
    return fitKeywords.reduce((sc,kw) => sc + (hay.includes(kw)?1:0), 0);
  }
  const bestFit = [...companies].map(c=>({...c,fit:fitScore(c)})).filter(c=>c.fit>0).sort((a,b)=>b.fit-a.fit).slice(0,10);

  const el = document.getElementById('strategy-view');
  el.innerHTML = `
  <div class="dash-grid">
    <div class="dash-card" style="grid-column:1/-1">
      <h3>Your Profile Match Score</h3>
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Companies ranked by how well they match your profile: French Foreign Legion + Norwegian Royal Guard + trilingual + royal/HNWI experience</div>
      ${bestFit.map((c,i)=>`
        <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="switchTab('companies');setTimeout(()=>openDetail('${c.id}'),100)">
          <span style="font-size:20px;font-weight:800;color:var(--accent);width:30px">#${i+1}</span>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:14px">${esc(c.company)}</div>
            <div style="font-size:11px;color:var(--muted)">${c.location?esc(c.location):''} ${c.country?'· '+esc(c.country):''}</div>
          </div>
          <div style="display:flex;gap:4px">${'*'.repeat(c.fit).split('').map(()=>'<span style="color:var(--accent)">&#9733;</span>').join('')}</div>
          <span style="font-size:11px;color:${statusColors[c.status]||'#52504d'};font-weight:600">${statusLabels[c.status]||'New'}</span>
        </div>
      `).join('')}
    </div>

    <div class="dash-card">
      <h3>This Week's Priorities</h3>
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">${hotCompanies.filter(c=>c.status==='ny').length} hot companies still untouched</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${hotCompanies.filter(c=>c.status==='ny').slice(0,8).map(c=>`
          <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--surface2);border-radius:6px;cursor:pointer" onclick="switchTab('companies');setTimeout(()=>openDetail('${c.id}'),100)">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0"></div>
            <span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.company)}</span>
            <span style="font-size:10px;color:var(--muted)">${c.location?esc(c.location):''}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="dash-card">
      <h3>Immediate Job Opportunities</h3>
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">${hotJobs.filter(j=>j.status==='ny').length} hot jobs you haven't applied to</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${hotJobs.filter(j=>j.status==='ny').slice(0,8).map(j=>{
          const salary = extractSalary(j.notes);
          return `
          <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--surface2);border-radius:6px;cursor:pointer" onclick="switchTab('jobs');setTimeout(()=>openDetail('${j.id}'),100)">
            <span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(j.company)}</span>
            ${salary?`<span style="color:var(--accent);font-weight:700;font-size:11px">${esc(salary)}</span>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="dash-card">
      <h3>Action Plan Summary</h3>
      <div style="display:flex;flex-direction:column;gap:10px;font-size:13px">
        <div style="padding:12px;background:rgba(192,57,43,.08);border-radius:8px;border-left:3px solid #c0392b">
          <strong style="color:#c0392b">Urgent:</strong> ${hotJobs.filter(j=>j.status==='ny').length} hot jobs + ${hotCompanies.filter(c=>c.status==='ny').length} hot companies need action
        </div>
        <div style="padding:12px;background:rgba(201,168,76,.08);border-radius:8px;border-left:3px solid var(--accent)">
          <strong style="color:var(--accent)">Pipeline:</strong> ${Object.entries({Contacted:leads.filter(l=>l.status==='kontaktet').length,Applied:leads.filter(l=>l.status==='applied').length,Interview:leads.filter(l=>l.status==='interview').length}).filter(([_,c])=>c>0).map(([s,c])=>c+' '+s).join(', ')||'Empty - start reaching out!'}
        </div>
        <div style="padding:12px;background:rgba(41,128,185,.08);border-radius:8px;border-left:3px solid #2980b9">
          <strong style="color:#2980b9">Focus regions:</strong> ${Object.entries(regionMap).map(([r])=>({r,c:leads.filter(l=>matchRegion(l,r)&&l.priority==='hot').length})).filter(x=>x.c>0).sort((a,b)=>b.c-a.c).slice(0,3).map(x=>x.r+' ('+x.c+')').join(', ')}
        </div>
      </div>
    </div>
  </div>`;
}

// === ACTIVITY LOG ===
const ACTIVITY_KEY = 'cp_activity_log';
let activityLog = JSON.parse(localStorage.getItem(ACTIVITY_KEY)||'[]');

function logActivity(leadId, action, detail) {
  activityLog.unshift({leadId, action, detail, time: new Date().toISOString()});
  if(activityLog.length>500) activityLog = activityLog.slice(0,500);
  localStorage.setItem(ACTIVITY_KEY, JSON.stringify(activityLog));
}

// Wrap updateStatus to log
const _origUpdateStatus = updateStatus;
updateStatus = function(id, status) {
  const l = leads.find(x=>x.id===id);
  if(l) logActivity(id, 'status_change', `${l.company}: ${statusLabels[l.status]||l.status} → ${statusLabels[status]||status}`);
  _origUpdateStatus(id, status);
};

// Keyboard shortcuts: N = new, Esc = close, D = dashboard, ? = help
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key === 'n' || e.key === 'N') openAdd();
  if (e.key === 'Escape') { closeModal(); closeDetail(); }
  if (e.key === 'd') switchTab('dashboard');
  if (e.key === 'j') switchTab('jobs');
  if (e.key === 'c') switchTab('companies');
  if (e.key === 's') switchTab('strategy');
  if (e.key === '?') alert('Keyboard shortcuts:\n\nN = New lead\n/ = Global search\nC = Companies\nJ = Jobs\nD = Dashboard\nS = Strategy\nEsc = Close panel');
});

refresh();
</script>
