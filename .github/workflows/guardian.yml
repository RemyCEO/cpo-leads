name: CPO Guardian - Health Monitor

on:
  schedule:
    # 5x daily UTC (= norsk tid +2): 04:00(06), 10:00(12), 16:00(18), 19:00(21 email), 21:00(23)
    - cron: '0 4 * * *'
    - cron: '0 10 * * *'
    - cron: '0 16 * * *'
    - cron: '0 19 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Determine if email report
        id: check-email
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "19" ]; then
            echo "send_email=true" >> $GITHUB_OUTPUT
          else
            echo "send_email=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Guardian health check with autofix
        id: health
        run: |
          EMAIL_PARAM=""
          if [ "${{ steps.check-email.outputs.send_email }}" = "true" ]; then
            EMAIL_PARAM="&email=true"
          fi

          SECRET="${{ secrets.HEALTH_SECRET }}"
          [ -z "$SECRET" ] && SECRET="cpo-guardian-2026"
          RESPONSE=$(curl -s "https://cpoleads.com/api/health?secret=${SECRET}&autofix=true${EMAIL_PARAM}" || echo '{"status":"unreachable"}')
          echo "$RESPONSE" | python3 -m json.tool > health_report.json 2>/dev/null || echo "$RESPONSE" > health_report.json

          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

          ALERTS=$(echo "$RESPONSE" | python3 -c "import sys,json; a=json.load(sys.stdin).get('alerts',[]); print(len(a))" 2>/dev/null || echo "0")
          echo "alerts=$ALERTS" >> $GITHUB_OUTPUT

          FIXES=$(echo "$RESPONSE" | python3 -c "import sys,json; f=json.load(sys.stdin).get('fixes_applied',[]); print(len(f))" 2>/dev/null || echo "0")
          echo "fixes=$FIXES" >> $GITHUB_OUTPUT

      - name: Check site uptime
        id: uptime
        run: |
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "https://cpoleads.com" || echo "000")
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          if [ "$HTTP_CODE" != "200" ]; then
            echo "site_down=true" >> $GITHUB_OUTPUT
          else
            echo "site_down=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram alert (if issues)
        if: steps.health.outputs.status != 'healthy' || steps.uptime.outputs.site_down == 'true'
        run: |
          STATUS="${{ steps.health.outputs.status }}"
          ALERTS="${{ steps.health.outputs.alerts }}"
          FIXES="${{ steps.health.outputs.fixes }}"
          SITE_DOWN="${{ steps.uptime.outputs.site_down }}"
          HTTP_CODE="${{ steps.uptime.outputs.http_code }}"

          if [ "$SITE_DOWN" = "true" ]; then
            MSG="🔴 *CPO LEADS IS DOWN!*%0A%0Acpoleads.com returned HTTP $HTTP_CODE%0ACheck Vercel dashboard immediately!"
          else
            ALERT_TEXT=$(cat health_report.json | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          alerts = d.get('alerts',[])
          fixes = d.get('fixes_applied',[])
          lines = ['⚠️ ' + a for a in alerts]
          if fixes:
              lines.append('')
              lines.append('✅ *Auto-fixes:*')
              lines.extend(['🔧 ' + f for f in fixes])
          print('%0A'.join(lines))
          " 2>/dev/null || echo "Unknown error")
            MSG="🚨 *CPO GUARDIAN ALERT*%0A%0A*Status:* ${STATUS}%0A*Alerts:* ${ALERTS}%0A%0A${ALERT_TEXT}"
          fi

          curl -sf "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&parse_mode=Markdown&text=$MSG" > /dev/null

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guardian-report-${{ github.run_number }}
          path: health_report.json
          retention-days: 7
