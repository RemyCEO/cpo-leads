name: CPO Scout - Job Enrichment

on:
  schedule:
    # 3x daily: 07:00, 13:00, 19:00 UTC (1-2 hours after scrapers)
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  enrich-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run Scout enrichment
        run: |
          RESPONSE=$(curl -sf "https://cpoleads.com/api/enrich-jobs?secret=cpo-scout-2026&batch_size=20&email=true" || echo '{"error":"request failed"}')
          echo "$RESPONSE" | python3 -c "
          import json,sys
          try:
            d=json.load(sys.stdin)
            print(f'Checked: {d.get(\"jobs_checked\",0)}, Enriched: {d.get(\"jobs_enriched\",0)}, Failed: {d.get(\"jobs_failed\",0)}')
            if d.get('error'):
              print(f'ERROR: {d[\"error\"]}')
              sys.exit(1)
          except:
            print('Failed to parse response')
            sys.exit(1)
          "
