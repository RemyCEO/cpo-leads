name: CPO Leads Job Scrapers

on:
  schedule:
    # 4x daily: 05:00, 11:00, 17:00, 23:00 UTC
    - cron: '0 5 * * *'
    - cron: '0 11 * * *'
    - cron: '0 17 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install --with-deps chromium
      - name: Run LinkedIn career page scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          sed -i "s|SUPABASE_URL = .*|SUPABASE_URL = \"$SUPABASE_URL\"|" scrape_jobs.py
          sed -i "s|SUPABASE_KEY = .*|SUPABASE_KEY = \"$SUPABASE_KEY\"|" scrape_jobs.py
          python scrape_jobs.py
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-jobs-${{ github.run_number }}
          path: scrape_log.txt
          retention-days: 7

  scrape-premium:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install --with-deps chromium
      - name: Run premium sources scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          sed -i "s|SUPABASE_URL = .*|SUPABASE_URL = \"$SUPABASE_URL\"|" scrape_premium.py
          sed -i "s|SUPABASE_KEY = .*|SUPABASE_KEY = \"$SUPABASE_KEY\"|" scrape_premium.py
          python scrape_premium.py
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-premium-${{ github.run_number }}
          path: scrape_premium_log.txt
          retention-days: 7

  enrich-jobs:
    runs-on: ubuntu-latest
    needs: [scrape-jobs, scrape-premium]
    timeout-minutes: 5
    steps:
      - name: Wait for Vercel cache to clear
        run: sleep 30
      - name: Run Scout enrichment (3 batches of 20)
        run: |
          for i in 1 2 3; do
            echo "=== Scout batch $i ==="
            RESPONSE=$(curl -sf "https://cpoleads.com/api/scout?secret=cpo-scout-2026&batch_size=20" || echo '{"error":"failed"}')
            echo "$RESPONSE" | python3 -c "
          import json,sys
          try:
            d=json.load(sys.stdin)
            print(f'Checked: {d.get(\"jobs_checked\",0)}, Enriched: {d.get(\"jobs_enriched\",0)}, Failed: {d.get(\"jobs_failed\",0)}')
          except:
            print('Failed to parse response')
          "
            sleep 5
          done

  scrape-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Run news alerts scraper
        run: python scrape_alerts.py
      - name: Upload intel news
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intel-news-${{ github.run_number }}
          path: intel_news.json
          retention-days: 7
